<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset password — GreenPulse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0F2438; --ink-2:#16324A; --paper:#F3F7F6;
    --teal:#1FB8A6; --coral-dim:#FCE8E5; --cloud:#7C93A3; --cloudLite:#9FC3C9;
    --line:#E4EBEA; --fieldBg:#FBFDFD;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'IBM Plex Sans',sans-serif;color:var(--ink);}
  h1{font-family:'Space Grotesk',sans-serif;}
  .wrap{display:flex;min-height:100vh;}
  .brand{flex:1;background:linear-gradient(160deg,var(--ink) 0%,var(--ink-2) 100%);color:#fff;display:flex;flex-direction:column;justify-content:center;padding:60px;}
  .logo-row{display:flex;align-items:center;gap:10px;margin-bottom:22px;}
  .logo{width:34px;height:34px;border-radius:11px;background:var(--teal);display:flex;align-items:center;justify-content:center;color:var(--ink);font-weight:700;font-size:13px;}
  .brand-name{font-size:22px;font-weight:700;}
  .brand-tag{font-size:15px;font-weight:600;color:var(--teal);}
  .form-side{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px;background:var(--paper);}
  .form-card{width:100%;max-width:380px;}
  .form-card h1{font-size:24px;margin:0 0 6px;}
  .form-card .sub{font-size:13px;color:var(--cloud);margin:0 0 22px;line-height:1.5;}
  label{display:block;font-size:11.5px;font-weight:600;color:var(--ink);margin:14px 0 5px;}
  label:first-of-type{margin-top:0;}
  input{width:100%;padding:11px 13px;border-radius:10px;border:1.5px solid var(--line);font-family:inherit;font-size:13.5px;color:var(--ink);background:var(--fieldBg);outline:none;}
  input:focus{border-color:var(--teal);}
  .btn{width:100%;margin-top:20px;appearance:none;border:none;cursor:pointer;font-family:inherit;font-weight:700;border-radius:12px;padding:13px 16px;font-size:14px;background:var(--ink);color:#fff;}
  .btn:hover{opacity:.92;}
  .btn:disabled{opacity:.5;cursor:not-allowed;}
  .error{display:none;margin-top:14px;background:var(--coral-dim);color:#B23B2E;border-radius:10px;padding:10px 12px;font-size:12.5px;font-weight:500;line-height:1.5;}
  .error.show{display:block;}
  .links{text-align:center;margin-top:20px;font-size:12.5px;color:var(--cloud);}
  .links a{color:var(--teal);text-decoration:none;font-weight:600;}
  @media (max-width:860px){.wrap{flex-direction:column;} .brand{flex:none;padding:32px 24px;} .form-side{flex:none;padding:32px 24px 60px;}}
</style>
</head>
<body>

<div class="wrap">
  <div class="brand">
    <div class="logo-row"><div class="logo">GP</div><div class="brand-name">GreenPulse</div></div>
    <div class="brand-tag">Smart Energy. Smarter Savings.</div>
  </div>

  <div class="form-side">
    <div class="form-card">

      <form id="emailForm">
        <h1>Reset your password</h1>
        <p class="sub">Enter your email and we'll send you a 6-digit code.</p>
        <label for="fp-email">Email address</label>
        <input type="email" id="fp-email" placeholder="you@example.com" required>
        <div class="error" id="emailError"></div>
        <button type="submit" class="btn" id="emailBtn">Send code</button>
      </form>

      <form id="resetForm" style="display:none;">
        <h1>Enter your code</h1>
        <p class="sub">If an account exists for <b id="fpEmailLabel"></b>, a code was sent — enter it below along with your new password.</p>
        <label for="fp-otp">Verification code</label>
        <input type="text" id="fp-otp" inputmode="numeric" maxlength="6" placeholder="000000" style="letter-spacing:6px;font-size:20px;text-align:center;font-weight:700;">
        <label for="fp-newpw">New password</label>
        <input type="password" id="fp-newpw" placeholder="••••••••">
        <label for="fp-newpw2">Confirm new password</label>
        <input type="password" id="fp-newpw2" placeholder="••••••••">
        <div class="error" id="resetError"></div>
        <button type="submit" class="btn" id="resetBtn">Reset password</button>
        <div class="links" style="margin-top:16px;">Didn't get a code? <a href="#" id="resendLink">Resend</a></div>
      </form>

      <div class="links" id="backToLogin">Remembered it? <a href="login.html">Log in</a></div>
    </div>
  </div>
</div>

<script>
const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
let fpEmail = '';

document.getElementById('emailForm').addEventListener('submit', async function(e){
  e.preventDefault();
  const email = document.getElementById('fp-email').value.trim();
  const errEl = document.getElementById('emailError');
  const btn = document.getElementById('emailBtn');
  errEl.classList.remove('show');

  if(!EMAIL_RE.test(email)){ errEl.textContent = 'Please enter a valid email.'; errEl.classList.add('show'); return; }

  btn.disabled = true; btn.textContent = 'Sending…';
  try{
    const res = await fetch('/api/auth', {
      method: 'POST', credentials: 'include', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ action:'forgot', email })
    });
    // Always proceed to the code-entry screen, whether or not the
    // email exists — the backend doesn't reveal that either.
    fpEmail = email;
    document.getElementById('fpEmailLabel').textContent = email;
    document.getElementById('emailForm').style.display = 'none';
    document.getElementById('backToLogin').style.display = 'none';
    document.getElementById('resetForm').style.display = 'block';
  }catch(err){
    errEl.textContent = "Can't reach the server right now — check your connection and try again.";
    errEl.classList.add('show');
    btn.disabled = false; btn.textContent = 'Send code';
  }
});

document.getElementById('resetForm').addEventListener('submit', async function(e){
  e.preventDefault();
  const otp = document.getElementById('fp-otp').value.trim();
  const newPassword = document.getElementById('fp-newpw').value;
  const newPassword2 = document.getElementById('fp-newpw2').value;
  const errEl = document.getElementById('resetError');
  const btn = document.getElementById('resetBtn');
  errEl.classList.remove('show'); errEl.style.color = '#B23B2E';

  if(!/^\d{6}$/.test(otp)){ errEl.textContent = 'Enter the 6-digit code.'; errEl.classList.add('show'); return; }
  if(newPassword.length < 8){ errEl.textContent = 'Password must contain at least 8 characters.'; errEl.classList.add('show'); return; }
  if(newPassword !== newPassword2){ errEl.textContent = 'Passwords do not match.'; errEl.classList.add('show'); return; }

  btn.disabled = true; btn.textContent = 'Resetting…';
  try{
    const res = await fetch('/api/auth', {
      method: 'POST', credentials: 'include', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ action:'reset', email: fpEmail, otp, newPassword })
    });
    const data = await res.json();
    if(!res.ok){
      errEl.textContent = data.error || 'Something went wrong.';
      errEl.classList.add('show');
      btn.disabled = false; btn.textContent = 'Reset password';
      return;
    }
    window.location.href = 'index.html';
  }catch(err){
    errEl.textContent = "Can't reach the server right now — check your connection and try again.";
    errEl.classList.add('show');
    btn.disabled = false; btn.textContent = 'Reset password';
  }
});

document.getElementById('resendLink').addEventListener('click', async function(e){
  e.preventDefault();
  const errEl = document.getElementById('resetError');
  errEl.classList.remove('show');
  try{
    await fetch('/api/auth', {
      method: 'POST', credentials: 'include', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ action:'forgot', email: fpEmail })
    });
    errEl.style.color = '#1FB8A6';
    errEl.textContent = 'A new code has been sent, if that email is registered.';
    errEl.classList.add('show');
  }catch(err){
    errEl.textContent = 'Network error — try again.';
    errEl.classList.add('show');
  }
});
</script>

</body>
</html>
