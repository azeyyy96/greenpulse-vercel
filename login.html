<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in — GreenPulse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0F2438; --ink-2:#16324A; --paper:#F3F7F6; --card:#FFFFFF;
    --teal:#1FB8A6; --teal-dim:#E4F5F2; --coral:#E85D4E; --coral-dim:#FCE8E5;
    --cloud:#7C93A3; --cloudLite:#9FC3C9; --line:#E4EBEA; --fieldBg:#FBFDFD;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'IBM Plex Sans',sans-serif;color:var(--ink);}
  h1,.display{font-family:'Space Grotesk',sans-serif;}

  .wrap{display:flex;min-height:100vh;}
  .brand{
    flex:1;background:linear-gradient(160deg,var(--ink) 0%,var(--ink-2) 100%);color:#fff;
    display:flex;flex-direction:column;justify-content:center;padding:60px;position:relative;overflow:hidden;
  }
  .brand-inner{position:relative;z-index:2;max-width:380px;}
  .logo-row{display:flex;align-items:center;gap:10px;margin-bottom:22px;}
  .logo{width:34px;height:34px;border-radius:11px;background:var(--teal);display:flex;align-items:center;justify-content:center;color:var(--ink);font-weight:700;font-size:13px;}
  .brand-name{font-size:22px;font-weight:700;}
  .brand-tag{font-size:15px;font-weight:600;color:var(--teal);margin-bottom:10px;}
  .brand-desc{font-size:13.5px;color:var(--cloudLite);line-height:1.6;}
  .illustration{margin-top:40px;}

  .form-side{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px;background:var(--paper);}
  .form-card{width:100%;max-width:380px;}
  .form-card h1{font-size:24px;margin:0 0 6px;}
  .form-card .sub{font-size:13px;color:var(--cloud);margin:0 0 26px;}
  label{display:block;font-size:11.5px;font-weight:600;color:var(--ink);margin:14px 0 5px;}
  label:first-of-type{margin-top:0;}
  input{
    width:100%;padding:11px 13px;border-radius:10px;border:1.5px solid var(--line);
    font-family:inherit;font-size:13.5px;color:var(--ink);background:var(--fieldBg);outline:none;transition:border-color .15s;
  }
  input:focus{border-color:var(--teal);}
  .btn{
    width:100%;margin-top:20px;appearance:none;border:none;cursor:pointer;font-family:inherit;font-weight:700;
    border-radius:12px;padding:13px 16px;font-size:14px;background:var(--ink);color:#fff;
  }
  .btn:hover{opacity:.92;}
  .btn:disabled{opacity:.5;cursor:not-allowed;}
  .error{
    display:none;margin-top:14px;background:var(--coral-dim);color:#B23B2E;border-radius:10px;
    padding:10px 12px;font-size:12.5px;font-weight:500;line-height:1.5;
  }
  .error.show{display:block;}
  .links{display:flex;justify-content:space-between;margin-top:20px;font-size:12.5px;}
  .links a{color:var(--teal);text-decoration:none;font-weight:600;}
  .links a:hover{text-decoration:underline;}

  @media (max-width:860px){
    .wrap{flex-direction:column;}
    .brand{flex:none;min-height:200px;padding:32px 24px;}
    .brand-inner{max-width:none;}
    .illustration{display:none;}
    .form-side{flex:none;padding:32px 24px 60px;}
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="brand">
    <div class="brand-inner">
      <div class="logo-row">
        <div class="logo">GP</div>
        <div class="brand-name">GreenPulse</div>
      </div>
      <div class="brand-tag">Smart Energy. Smarter Savings.</div>
      <div class="brand-desc">AI-powered electricity management for students — track appliances, catch overuse before it hits your bill, and stay on budget without the guesswork.</div>

      <div class="illustration">
        <svg width="280" height="180" viewBox="0 0 280 180" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="220" cy="40" r="22" fill="#E8A33D" opacity="0.9"/>
          <g stroke="#E8A33D" stroke-width="2" stroke-linecap="round" opacity="0.7">
            <line x1="220" y1="4" x2="220" y2="12"/>
            <line x1="256" y1="40" x2="248" y2="40"/>
            <line x1="245" y1="15" x2="239" y2="21"/>
          </g>
          <path d="M40 150 L40 95 L90 60 L140 95 L140 150 Z" fill="none" stroke="#3FD9C4" stroke-width="2.5" stroke-linejoin="round"/>
          <rect x="75" y="115" width="30" height="35" fill="#3FD9C4" opacity="0.15" stroke="#3FD9C4" stroke-width="2"/>
          <rect x="48" y="105" width="16" height="16" fill="none" stroke="#3FD9C4" stroke-width="2"/>
          <path d="M20 150 H160" stroke="#2A4560" stroke-width="2"/>
          <path d="M0 130 H30 L36 130 L40 118 L46 142 L50 130 L58 130 H70" fill="none" stroke="#3FD9C4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
          <path d="M170 60 Q180 40 200 45 Q215 48 212 65 Q225 65 222 80 Q220 90 205 88 L180 88 Q165 88 165 75 Q165 63 175 63" fill="none" stroke="#9FC3C9" stroke-width="1.6" opacity="0.5"/>
        </svg>
      </div>
    </div>
  </div>

  <div class="form-side">
    <div class="form-card">
      <h1>Welcome back</h1>
      <p class="sub">Log in to keep tracking your electricity usage.</p>

      <form id="loginForm">
        <label for="li-email">Email address</label>
        <input type="email" id="li-email" placeholder="you@example.com" required>

        <label for="li-password">Password</label>
        <input type="password" id="li-password" placeholder="••••••••" required>

        <div class="error" id="loginError"></div>

        <button type="submit" class="btn" id="loginBtn">Log in</button>
      </form>

      <div class="links">
        <a href="forgot-password.html">Forgot password?</a>
        <a href="register.html">Create an account</a>
      </div>
    </div>
  </div>
</div>

<script>
const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

document.getElementById('loginForm').addEventListener('submit', async function(e){
  e.preventDefault();
  const email = document.getElementById('li-email').value.trim();
  const password = document.getElementById('li-password').value;
  const errEl = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');
  errEl.classList.remove('show');

  if(!EMAIL_RE.test(email)){
    errEl.textContent = 'Please enter a valid email.';
    errEl.classList.add('show');
    return;
  }
  if(password.length < 8){
    errEl.textContent = 'Password must contain at least 8 characters.';
    errEl.classList.add('show');
    return;
  }

  btn.disabled = true; btn.textContent = 'Logging in…';
  try{
    const res = await fetch('/api/auth', {
      method: 'POST',
      credentials: 'include',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({action:'login', email, password})
    });
    const data = await res.json();
    if(!res.ok){
      errEl.textContent = data.error || 'Something went wrong. Please try again.';
      errEl.classList.add('show');
      btn.disabled = false; btn.textContent = 'Log in';
      return;
    }
    window.location.href = 'index.html';
  }catch(err){
    errEl.textContent = "Can't reach the server right now — check your connection and try again.";
    errEl.classList.add('show');
    btn.disabled = false; btn.textContent = 'Log in';
  }
});
</script>

</body>
</html>
